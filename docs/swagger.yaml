definitions:
  admin.ResetResponse:
    properties:
      contentGroupsDeleted:
        type: integer
      filesDeleted:
        type: integer
      groupMembersDeleted:
        type: integer
      scanSessionsDeleted:
        type: integer
    type: object
  pipeline.FileCountResponse:
    properties:
      filesHashed:
        type: integer
      filesScanned:
        type: integer
    type: object
  pipeline.StartScanRequest:
    properties:
      rootPaths:
        items:
          type: string
        type: array
    required:
    - rootPaths
    type: object
  pipeline.StartScanResponse:
    properties:
      message:
        type: string
      sessionId:
        type: string
      status:
        type: string
    type: object
info:
  contact: {}
  description: API documentation for WanderSort
  title: WanderSort API
  version: "1.0"
paths:
  /internal/v1/admin/reset:
    post:
      description: Deletes all scan sessions, file registry entries, content groups
        and group members in a single transaction. Irreversible.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/admin.ResetResponse'
      summary: Reset all application data
      tags:
      - Admin
  /internal/v1/pipeline/count:
    get:
      description: Returns the number of files discovered by the scanner and the number
        hashed.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pipeline.FileCountResponse'
      summary: Get combined file counts
      tags:
      - Pipeline
  /internal/v1/pipeline/start:
    post:
      consumes:
      - application/json
      description: Submit root paths to the pipeline. Scanning and hashing run automatically.
      parameters:
      - description: Start Scan Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/pipeline.StartScanRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/pipeline.StartScanResponse'
      summary: Start a new pipeline scan
      tags:
      - Pipeline
  /internal/v1/pipeline/ws:
    get:
      description: Opens a WebSocket connection that pushes PipelineStatus JSON messages
        in real time.
      responses:
        "101":
          description: Switching Protocols
          schema:
            type: string
      summary: Stream pipeline status via WebSocket
      tags:
      - Pipeline
swagger: "2.0"
